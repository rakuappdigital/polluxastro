<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Sol kart (hafif sola yatık) -->
  <rect x="3" y="7" width="7" height="11" rx="1.5"
        stroke="currentColor" stroke-width="1.25"
        transform="rotate(-12 6.5 12.5)"/>
  <!-- Sağ kart (hafif sağa yatık) -->
  <rect x="14" y="7" width="7" height="11" rx="1.5"
        stroke="currentColor" stroke-width="1.25"
        transform="rotate(12 17.5 12.5)"/>
  <!-- Orta kart (dik, üstte) -->
  <rect x="8.5" y="5" width="7" height="11" rx="1.5"
        stroke="currentColor" stroke-width="1.25"/>
  <!-- Orta kart küçük yıldız -->
  <line x1="12" y1="8.5" x2="12" y2="11.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="10.5" y1="10" x2="13.5" y2="10" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
</svg>
